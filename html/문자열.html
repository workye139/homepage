<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>문자열 조작 연습</h1>

    <div id="password"></div>
    <script>

        let password=1234;

        document.getElementById("password").innerHTML=`비밀번호는 ${password}입니다`;
    </script>
</body>
</html>
