<!DOCTYPE html>
<html lang="ko">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>텍스트 입력 연습</title>
 <style>
    .form-group {
    margin-bottom: 15px;
    }
    .form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 700;
    }
    .form-group input[type="text"] {
    width: 300px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
 }
 </style>
</head>
<body>
 <h2>회원가입 폼</h2>
 <form>
   <div class="form-group">
    <label for="name">이름: </label>
    <input type="text" name="username" id="name" placeholder="홍길동" maxlength="10" required>
    <br><br>
    </div>
    <div class="form-group">
    <label for="pwd">비밀번호: </label>
    <input type="password" id="pwd" name="password" placeholder="한글/특수문자/영어" size="30">
    <br><br>
   </div>
   <div class="form-group">
    <label>이메일: </label>
    <input type="text" name="email" placeholder="example@naver.com" size="30">
    <br><br>
   </div>
   <div class="form-group">
    <!-- <label>가입형식: </label> -->
    <input type="hidden" name="accession" value="이벤트가입" size="30" readonly>
    <br><br>
   </div>
    <input type="submit" value="가입하기">
 </form>
</body>
</html>
