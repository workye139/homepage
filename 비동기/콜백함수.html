<!DOCTYPE html>
<html>
<head>
    <title>콜백 함수 실습</title>
</head>
<body>
    <button id="startBtn">작업 시작</button>
    <div id="result"></div>

    <script>
        // 콜백 함수들을 미리 정의
        function 성공알림() {
            document.getElementById('result').innerHTML = 
                '<p style="color: green;">✅ 작업이 성공적으로 완료되었습니다!</p>';
        }

        function 실패알림() {
            document.getElementById('result').innerHTML = 
                '<p style="color: red;">❌ 작업 중 오류가 발생했습니다.</p>';
        }

        // 메인 작업 함수 (콜백 함수를 받음)
        function 작업수행(성공콜백, 실패콜백) {
            document.getElementById('result').innerHTML = 
                '<p>작업 진행 중...</p>';

            // 3초 후 랜덤하게 성공 또는 실패
            setTimeout(function() {
                if (Math.random() > 0.5) {
                    성공콜백(); // 성공 시 실행할 함수
                } else {
                    실패콜백(); // 실패 시 실행할 함수
                }
            }, 3000);
        }

        // 버튼 클릭 이벤트
        document.getElementById('startBtn').addEventListener('click', function() {
            작업수행(성공알림, 실패알림);
        });
    </script>
</body>
</html>
