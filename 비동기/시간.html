<!DOCTYPE html>
<html>
<head>
    <title>타이머 제어</title>
    <style>
        .container {
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        #counter {
            font-size: 2em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>타이머 제어 실습</h1>
        <div id="counter">0</div>
        <button onclick="startTimer()">시작</button>
        <button onclick="stopTimer()">정지</button>
        <button onclick="resetTimer()">리셋</button>
    </div>

    <script>
        let count = 0;
        let timer = null;

        function startTimer() {
            // 이미 실행 중이면 중복 실행 방지
            if (timer !== null) return;

            timer = setInterval(function() {
                count++;
                document.getElementById('counter').innerHTML = count;
            }, 1000);
        }

        function stopTimer() {
            if (timer !== null) {
                clearInterval(timer);
                timer = null;
            }
        }

        function resetTimer() {
            stopTimer();
            count = 0;
            document.getElementById('counter').innerHTML = count;
        }
    </script>
</body>
</html>
